<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=0.25">
<title>🌌 知识图谱星系</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;overflow:hidden;height:100vh;width:100vw}
#svg{position:fixed;inset:0;z-index:1}
#info{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(10,10,26,0.9);padding:4px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);font-size:12px;color:#aaa;white-space:nowrap}
#info strong{color:#fff}
#info .badge{display:none;background:#4A90D9;color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px}
#info .badge.active{display:inline-block}
#search{position:fixed;top:12px;right:14px;z-index:100;background:rgba(20,20,40,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:4px 10px;color:#ddd;font-size:11px;width:110px;outline:none}
#search:focus{border-color:#4A90D9;width:150px}
.node-highlight circle { filter: drop-shadow(0 0 8px #00FF88); }
.node-highlight text { fill: #00FF88 !important; font-weight: bold; }
#legend{position:fixed;bottom:14px;left:14px;z-index:100;background:rgba(10,10,26,0.85);padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);font-size:9px}
.legend-item{display:flex;align-items:center;gap:3px;margin:2px 0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-line{width:12px;height:2px;border-radius:1px;flex-shrink:0;background:#888}
.legend-label{color:#999}
#stats{position:fixed;bottom:14px;right:14px;z-index:100;background:rgba(10,10,26,0.85);padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);font-size:9px;color:#666;text-align:right}
#stats strong{color:#aaa}
#tooltip{position:fixed;padding:6px 10px;background:rgba(10,10,30,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:6px;font-size:10px;pointer-events:none;z-index:200;max-width:250px;display:none;backdrop-filter:blur(16px)}
#tooltip .tt-name{font-size:12px;font-weight:600;color:#fff}
#tooltip .tt-type{font-size:9px;color:#999}
#tooltip .tt-desc{font-size:10px;color:#aaa;margin-top:4px}
#node-detail{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;background:rgba(12,12,30,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px;max-width:380px;width:85%;max-height:60vh;overflow-y:auto;display:none}
#node-detail h2{font-size:15px;margin-bottom:2px;display:flex;align-items:center;gap:5px;color:#fff}
#node-detail .nd-type{font-size:9px;padding:1px 5px;border-radius:4px}
#node-detail .nd-meta{font-size:10px;color:#888;margin-bottom:5px}
#node-detail .nd-desc{font-size:11px;color:#bbb;line-height:1.4;margin-bottom:6px}
#node-detail .nd-rel-item{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;gap:3px;align-items:center;font-size:10px;cursor:pointer;transition:background .1s}
#node-detail .nd-rel-item:hover{background:rgba(74,144,217,0.1)}
#node-detail .close-btn{float:right;cursor:pointer;font-size:16px;color:#666;padding:0 3px;line-height:1}
#node-detail .close-btn:hover{color:#fff}
#loading{position:fixed;inset:0;z-index:9999;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#666;font-size:13px}
#loading .spinner{width:28px;height:28px;border:3px solid rgba(74,144,217,0.15);border-top-color:#4A90D9;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#focus-hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(74,144,217,0.15);padding:4px 12px;border-radius:12px;border:1px solid rgba(74,144,217,0.3);font-size:10px;color:#4A90D9;display:none}
#highlight-panel{position:fixed;top:50px;right:14px;z-index:400;background:rgba(10,10,26,0.9);border:1px solid rgba(74,144,217,0.3);border-radius:12px;padding:12px 16px;min-width:200px;max-height:60vh;overflow-y:auto;display:none}
#highlight-panel h3{font-size:13px;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:6px}
#highlight-panel .hp-count{font-size:10px;color:#666;margin-bottom:4px}
#highlight-panel .hp-item{font-size:11px;color:#aaa;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:4px;cursor:pointer;transition:background .1s}
#highlight-panel .hp-item:hover{background:rgba(74,144,217,0.1)}
#highlight-panel .hp-arrow{color:#4A90D9;font-size:9px;margin-right:2px}
#highlight-panel .hp-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
#highlight-panel .hp-rel-type{font-size:8px;color:#666;background:rgba(255,255,255,0.05);padding:0 3px;border-radius:2px}
#highlight-panel .hp-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
#highlight-panel .hp-close{float:right;cursor:pointer;font-size:14px;color:#555;line-height:1}
#highlight-panel .hp-close:hover{color:#fff}
#highlight-panel .hp-exit-btn{display:block;width:100%;margin-top:6px;padding:4px 0;background:rgba(74,144,217,0.15);border:1px solid rgba(74,144,217,0.3);border-radius:6px;color:#4A90D9;font-size:10px;cursor:pointer;text-align:center}
#highlight-panel .hp-exit-btn:hover{background:rgba(74,144,217,0.25)}
.zoom-info{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;color:#555;z-index:100}

/* === 移动端适配 === */
@media (max-width: 600px) {
  #info{font-size:10px;padding:3px 10px;white-space:normal;max-width:70vw;left:10px;transform:none}
  #search{top:12px;right:10px;width:80px;font-size:10px}
  #search:focus{width:110px}
  #legend{font-size:8px;padding:4px 8px;bottom:10px;left:10px}
  #stats{font-size:8px;padding:3px 8px;bottom:10px;right:10px}
  #stats strong{font-size:9px}
  #tooltip{font-size:9px;max-width:200px;padding:5px 8px}
  #tooltip .tt-name{font-size:11px}
  #node-detail{max-width:90vw;padding:10px;width:92%}
  #node-detail h2{font-size:13px}
  #loading .spinner{width:24px;height:24px}
  #loading{font-size:12px}
  .legend-dot{width:6px;height:6px}
  .legend-line{width:10px}
  #focus-hint{font-size:9px;padding:3px 10px}
  #highlight-panel{top:44px;right:6px;min-width:160px;padding:8px 10px;max-height:50vh}
  #highlight-panel h3{font-size:11px}
  #highlight-panel .hp-count{font-size:9px}
  #highlight-panel .hp-item{font-size:10px}
}
@media (max-width: 400px) {
  #info{font-size:9px;padding:2px 8px;max-width:65vw}
  #search{width:65px;font-size:9px;padding:3px 8px}
  #search:focus{width:90px}
  #legend{font-size:7px;padding:3px 6px}
  #stats{font-size:7px;padding:2px 6px}
  #stats strong{font-size:8px}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>🌌 加载星系...</div><div id="loadInfo" style="font-size:11px;color:#666;margin-top:4px;text-align:center;padding:0 20px"></div></div>

<div id="svg"></div>

<div id="info">🌌 <strong id="gTitle">知识图谱星系</strong><span id="gLvl" style="color:#666;margin-left:8px">加载中</span><span class="badge" id="focusBadge">🔍 聚焦中</span><span id="backBtn" style="display:none;margin-left:8px;cursor:pointer;color:#4A90D9;font-size:11px;" onclick="backToGalaxy()">← 返回银河系</span></div>
<input id="search" placeholder="🔍 搜索...">
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div><div class="legend-label">核心节点</div></div>
  <div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div><div class="legend-label">普通节点</div></div>
  <div class="legend-item" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.05)"><div class="legend-line"></div><div class="legend-label">关系连线</div></div>
  <div class="legend-item" style="margin-top:2px"><div class="legend-dot" style="background:#FFD700"></div><div class="legend-label">子行业</div></div>
</div>
<div id="stats"><strong id="sN">?</strong>节点 <strong id="sE">?</strong>关系</div>
<div id="tooltip"></div>
<div id="focus-hint">🔄 点击空白处退出聚焦 · Esc</div>
<div id="node-detail"><span class="close-btn" onclick="closeD()">✕</span><div id="dContent"></div></div>
<div id="highlight-panel">
  <span class="hp-close" onclick="exitFocus()">✕</span>
  <h3>🔗 关联关系</h3>
  <div id="hpContent"></div>
  <button class="hp-exit-btn" onclick="exitFocus()">← 退出聚焦</button>
</div>

<!-- D3.js 核心库 -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- 主应用代码 -->
<script>
// ===== 数据 =====
var GAL = [
  {"name":"新能源电池行业","count":1961,"color":"#FF6B6B"},
  {"name":"电力设备","count":1860,"color":"#FFB347"},
  {"name":"医药","count":271,"color":"#FFD700"},
  {"name":"半导体","count":246,"color":"#48C9B0"},
  {"name":"低空经济","count":202,"color":"#4A90D9"},
  {"name":"电力","count":165,"color":"#50C878"},
  {"name":"机械设备","count":144,"color":"#9B59B6"},
  {"name":"人工智能","count":123,"color":"#E91E63"},
  {"name":"汽车零部件","count":118,"color":"#00BCD4"},
  {"name":"有色金属","count":104,"color":"#8BC34A"},
  {"name":"军工","count":87,"color":"#CDDC39"},
  {"name":"科技-主题研究","count":60,"color":"#FF9800"},
  {"name":"金融","count":51,"color":"#795548"},
  {"name":"光伏设备","count":47,"color":"#607D8B"},
  {"name":"证券","count":42,"color":"#E74C3C"},
  {"name":"机械","count":30,"color":"#F39C12"},
  {"name":"金融-主题研究","count":30,"color":"#1ABC9C"},
  {"name":"金融-跨领域研究","count":29,"color":"#3498DB"},
  {"name":"消费","count":17,"color":"#2ECC71"},
  {"name":"地产","count":13,"color":"#9B59B6"},
  {"name":"未分类","count":6,"color":"#34495E"},
  {"name":"金融-宏观分析","count":6,"color":"#16A085"},
  {"name":"宏观分析","count":5,"color":"#D35400"}
];

var ENT = null, EDG = null, EIX = null, em = {};
var svg = null, g = null, zoom = null;
var curLv = 'gal', curGal = null, curFocus = null, connectedIds = null;
var simulation = null;
var focusTimer = null;
var W = window.innerWidth, H = window.innerHeight;

// ===== SVG 初始化 =====
function initSVG() {
  d3.select('#svg').selectAll('*').remove();
  svg = d3.select('#svg')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('cursor', 'grab');

  zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', function(event) {
      d3.select('#g').attr('transform', event.transform);
    });

  svg.call(zoom);
  svg.append('g').attr('id', 'g');

  // 背景点击退出聚焦
  svg.on('click', function(event) {
    if (event.target === svg.node() && curFocus) exitFocus();
  });
}

// ===== 力模拟创建 =====
function createSimulation(nodes, links) {
  if (simulation) simulation.on('tick', null).on('end', null);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(80).iterations(2))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide().radius(25).iterations(2));

  return simulation;
}

// ===== 银河系视图 =====
function renderGalaxy() {
  curLv = 'gal';
  curGal = null;
  curFocus = null;
  connectedIds = null;
  document.getElementById('backBtn').style.display = 'none';
  if (focusTimer) { clearTimeout(focusTimer); focusTimer = null; }

  document.getElementById('gTitle').textContent = '知识图谱星系';
  document.getElementById('gLvl').textContent = '银河系 · ' + GAL.length + '个行业';
  document.getElementById('focusBadge').classList.remove('active');
  document.getElementById('highlight-panel').style.display = 'none';
  document.getElementById('focus-hint').style.display = 'none';

  // 创建节点数据
  var nodes = GAL.map(function(d, i) {
    var angle = (i / GAL.length) * Math.PI * 2;
    var radius = Math.min(W, H) * 0.35;
    return {
      id: d.name,
      name: d.name,
      nodeType: 'gal',
      color: d.color,
      count: d.count,
      val: Math.max(15, Math.min(30, Math.log(d.count) * 5)),
      x: W/2 + Math.cos(angle) * radius,
      y: H/2 + Math.sin(angle) * radius,
      fx: W/2 + Math.cos(angle) * radius,
      fy: H/2 + Math.sin(angle) * radius
    };
  });

  // 无连线（银河系只有行业节点）
  var links = [];

  initSVG();
  var g = d3.select('#g');

  // 渲染连线
  var link = g.append('g').attr('class', 'links').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', '#555').attr('stroke-width', 1).attr('opacity', 0.3);

  // 渲染节点
  var node = g.append('g').attr('class', 'nodes').selectAll('g')
    .data(nodes).enter().append('g')
    .attr('class', 'node')
    .attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; })
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));

  node.append('circle')
    .attr('r', function(d) { return d.val; })
    .attr('fill', function(d) { return d.color; })
    .attr('stroke', '#fff').attr('stroke-width', 1)
    .attr('opacity', 0.85);

  node.append('text')
    .attr('dy', function(d) { return d.val + 12; })
    .attr('text-anchor', 'middle')
    .attr('fill', '#ddd').attr('font-size', '10px')
    .text(function(d) { return d.name + '\n' + '(' + d.count + '家)'; });

  node.on('click', function(event, d) {
    solar(d.name);
  });

  node.on('mouseover', function(event, d) {
    var t = document.getElementById('tooltip');
    t.style.display = 'block';
    t.innerHTML = '<div class="tt-name">' + d.name + '</div>' +
      '<div class="tt-type">行业 · ' + d.count + '家企业</div>';
    t.style.left = (event.pageX + 10) + 'px';
    t.style.top = (event.pageY - 10) + 'px';
  });
  node.on('mouseout', function() {
    document.getElementById('tooltip').style.display = 'none';
  });

  updateStats(nodes.length, links.length);
  document.getElementById('loading').style.display = 'none';

  // 自动缩放适配
  setTimeout(function() { fitView(g, nodes); }, 100);
}

function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ===== 太阳系视图 =====
function solar(galName) {
  if (focusTimer) { clearTimeout(focusTimer); focusTimer = null; }
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loadInfo').textContent = '正在加载 ' + galName + ' ...';

  // ① 记忆银河系节点位置（用于 GrowCircle 过渡动画）
  var galPositions = {};
  try {
    d3.selectAll('.node > circle').each(function(d) {
      if (d && d.nodeType === 'gal' && d.id) {
        var nodeEl = this.parentNode;
        var t = nodeEl.getAttribute('transform');
        if (t) {
          var m = t.match(/translate\(([\d.]+),([\d.]+)\)/);
          if (m) { galPositions[d.id] = { x: +m[1], y: +m[2] }; }
        }
      }
    });
  } catch(e) {}
  var startPos = galPositions[galName] || { x: W/2, y: H/2 };

  curLv = 'sol';
  curGal = galName;
  curFocus = null;
  connectedIds = null;

  document.getElementById('gTitle').textContent = galName;
  document.getElementById('gLvl').textContent = '☉ 太阳系';
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('focusBadge').classList.remove('active');
  document.getElementById('highlight-panel').style.display = 'none';
  document.getElementById('focus-hint').style.display = 'none';

  loadSectorData(galName, function(data) {
    var ents = data.entities;
    var edges = data.edges;

    // 按子行业分组
    var grp = {};
    ents.forEach(function(e) {
      var k = e.subIndustry || e.sector || '未分类';
      if (!grp[k]) grp[k] = [];
      grp[k].push(e);
    });

    // 构建节点和连线
    var nodes = [], nid = {};
    var starNodes = {};

    // 创建子行业"恒星"节点
    Object.keys(grp).sort(function(a, b) { return grp[b].length - grp[a].length; }).forEach(function(gk, k) {
      var ge = grp[gk];
      var isSub = gk !== galName;
      var sid = 's_' + k;
      starNodes[gk] = {
        id: sid,
        name: gk,
        nodeType: isSub ? 'star' : 'center',
        count: ge.length,
        color: isSub ? '#FFD700' : '#FF6B6B',
        val: isSub ? 12 : 20,
        isCenter: !isSub
      };
      nodes.push(starNodes[gk]);
      nid[sid] = true;
    });

    // 创建实体"行星"节点
    Object.keys(grp).forEach(function(gk) {
      var ge = grp[gk];
      var star = starNodes[gk];
      var starIdx = nodes.indexOf(star);

      ge.forEach(function(e) {
        nodes.push({
          id: e.id,
          name: e.name,
          nodeType: 'plnt',
          typeLabel: e.typeLabel,
          desc: e.desc,
          color: e.color,
          val: 6,
          sector: gk,
          starId: star.id
        });
        nid[e.id] = true;
        em[e.id] = e;
      });
    });

    // 构建连线
    var links = edges.filter(function(e) {
      return nid[e.source] && nid[e.target];
    }).map(function(e) {
      return {
        source: e.source,
        target: e.target,
        type: e.type,
        color: e.color
      };
    });

    // 添加子行业→实体的连线（让力模拟知道层级关系）
    nodes.forEach(function(n) {
      if (n.nodeType === 'plnt') {
        links.push({
          source: n.starId,
          target: n.id,
          type: '归属',
          color: '#666',
          isHierarchy: true
        });
      }
    });

    // ② GrowCircle：所有节点初始聚集到银河系点击位置
    nodes.forEach(function(n) {
      var angle = Math.random() * Math.PI * 2;
      var dist = 3 + Math.random() * 12;
      n.x = startPos.x + Math.cos(angle) * dist;
      n.y = startPos.y + Math.sin(angle) * dist;
    });

    renderForceGraph(nodes, links, {
      label: function(n) {
        if (n.nodeType === 'gal') return n.name + '\n(' + n.count + '家)';
        if (n.nodeType === 'star') return n.name + '\n(' + n.count + '家)';
        if (n.nodeType === 'center') return n.name;
        return n.name + (n.typeLabel ? '\n' + n.typeLabel : '');
      },
      linkColor: function(l) {
        if (l.isHierarchy) return '#444';
        var c = l.color || '#888';
        if (c === '#555555' || c === '#555' || c === '#444') return '#AAAAAA';
        return c;
      },
      linkWidth: function(l) { return l.isHierarchy ? 1 : 2; },
      linkOpacity: function(l) { return l.isHierarchy ? 0.3 : 0.6; },
      nodeRadius: function(n) { return n.val || 5; },
      focusable: true
    });

    updateStats(nodes.length, links.length);
    // GrowCircle：延迟隐藏加载，让用户看到节点从聚集处向外扩散的过程
    setTimeout(function() {
      document.getElementById('loading').style.display = 'none';
    }, 600);
  });
}

// ===== 力导向图渲染（核心）=====
function renderForceGraph(nodes, links, options) {
  if (simulation) simulation.on('tick', null).on('end', null);
  d3.select('#svg').selectAll('*').remove();

  svg = d3.select('#svg')
    .attr('width', W).attr('height', H)
    .style('cursor', 'grab');

  zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', function(event) {
    d3.select('#g').attr('transform', event.transform);
  });
  svg.call(zoom);

  var g = svg.append('g').attr('id', 'g');

  // 创建力模拟
  simulation = d3.forceSimulation(nodes)
    .alphaDecay(0.02)
    .velocityDecay(0.3)
    .alphaMin(0.001)
    .force('link', d3.forceLink(links).id(d => d.id).distance(function(l) {
      if (l.isHierarchy) return 60;
      if (options.focusNode) return 120;
      return 100;
    }).iterations(3))
    .force('charge', d3.forceManyBody().strength(function(d) {
      if (d.nodeType === 'center' || d.nodeType === 'focus') return -800;
      if (d.nodeType === 'star') return -500;
      if (d.nodeType === 'plnt') return -350;
      return -300;
    }).distanceMax(800))
    .force('center', options.focusNode
      ? d3.forceCenter(W/2, H/2).strength(0.05)
      : d3.forceCenter(W/2, H/2).strength(0.1))
    .force('collide', d3.forceCollide().radius(function(d) {
      var r = (d.val || 6) + 12;
      if (d.nodeType === 'center') return 40;
      if (d.nodeType === 'focus') return 50;
      if (d.nodeType === 'star') return 30;
      return r;
    }).iterations(3));

  // 如果是聚焦模式，中心节点固定
  if (options.focusNode) {
    options.focusNode.fx = W/2;
    options.focusNode.fy = H/2;
  }

  // 渲染连线 — 从透明淡入
  var link = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', options.linkColor || '#888')
    .attr('stroke-width', options.linkWidth || 1)
    .attr('opacity', 0);  // 初始透明

  // 渲染节点 — 从透明淡入
  var node = g.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(nodes).enter().append('g')
    .attr('class', 'node')
    .style('opacity', 0)  // 初始透明
    .call(d3.drag()
      .on('start', dragStarted2)
      .on('drag', dragged2)
      .on('end', dragEnded2));

  node.append('circle')
    .attr('r', options.nodeRadius || function(d) { return d.val || 5; })
    .attr('fill', function(d) { return d.color || '#888'; })
    .attr('stroke', function(d) { return d.nodeType === 'star' ? '#FFD700' : '#fff'; })
    .attr('stroke-width', function(d) { return d.nodeType === 'star' ? 2 : 1; })
    .attr('opacity', 0.85);

  // 节点标签
  node.append('text')
    .attr('dy', function(d) { return (options.nodeRadius || function(n){return n.val||5;})(d) + 10; })
    .attr('text-anchor', 'middle')
    .attr('fill', '#ddd').attr('font-size', '9px')
    .attr('pointer-events', 'none')
    .text(options.label || function(d) { return d.name; });

  // 节点点击
  node.on('click', function(event, n) {
    event.stopPropagation();
    if (curLv === 'gal') {
      solar(n.name);
    } else if (options.focusable && n.nodeType === 'plnt') {
      focusMode(n);
    } else if (options.focusable && n.nodeType === 'star') {
      // 点击子行业恒星，聚焦该子行业
      focusMode(n);
    }
  });

  // 节点悬停
  node.on('mouseover', function(event, n) {
    var t = document.getElementById('tooltip');
    t.style.display = 'block';
    var html = '<div class="tt-name">' + n.name + '</div>';
    if (n.typeLabel) html += '<div class="tt-type">' + n.typeLabel + '</div>';
    if (n.desc) html += '<div class="tt-desc">' + n.desc.substring(0, 100) + '</div>';
    if (n.count) html += '<div class="tt-type" style="margin-top:4px;color:#4A90D9">' + n.count + '家企业</div>';
    t.innerHTML = html;
    t.style.left = (event.pageX + 10) + 'px';
    t.style.top = (event.pageY - 10) + 'px';
  });
  node.on('mouseout', function() {
    document.getElementById('tooltip').style.display = 'none';
  });

  // ticking 更新位置 + 首次淡入
  var hasFadedIn = false;
  simulation.on('tick', function() {
    // 首次 tick：触发淡入
    if (!hasFadedIn && link.size() > 0) {
      hasFadedIn = true;
      node.transition().duration(800).style('opacity', 1);
      link.transition().duration(800).attr('opacity', options.linkOpacity || 0.5);
    }

    link
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });

    node.attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  });

  // 初始冷却
  simulation.on('end', function() {
    // 模拟运行结束，保持当前状态
  });

  // 自动缩放适配（移动端稍等冷却更充分）
  var fitDelay = W < 500 ? 1200 : 500;
  setTimeout(function() { fitView(g, nodes); }, fitDelay);
}

function dragStarted2(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  if (!d.isCenter) {
    d.fx = d.x;
    d.fy = d.y;
  }
}
function dragged2(event, d) {
  if (!d.isCenter) {
    d.fx = event.x;
    d.fy = event.y;
  }
}
function dragEnded2(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  if (!d.isCenter) {
    d.fx = null;
    d.fy = null;
  }
}

function fitView(g, nodes) {
  if (!nodes || nodes.length === 0) return;
  var x = d3.extent(nodes, d => d.x), y = d3.extent(nodes, d => d.y);
  if (!x[0] || !x[1] || !y[0] || !y[1]) return;
  var pad = Math.min(W, H) * 0.08;
  var w = Math.max(x[1] - x[0], 100) + pad * 2;
  var h = Math.max(y[1] - y[0], 100) + pad * 2;
  var maxScale = W < 500 ? 3 : 2;
  var scale = Math.min((W - pad * 2) / w, (H - pad * 2) / h, maxScale);
  var tx = W/2 - scale * (x[0] + x[1]) / 2;
  var ty = H/2 - scale * (y[0] + y[1]) / 2;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ===== 聚焦模式（三级页面）=====
function focusMode(node) {
  if (!EIX || !EIX[node.id]) {
    loadEdgeIndex(function() {
      if (EIX && EIX[node.id]) doFocusMode(node);
    });
    return;
  }
  doFocusMode(node);
}

function doFocusMode(node) {
  if (focusTimer) { clearTimeout(focusTimer); focusTimer = null; }
  closeD();

  document.getElementById('gTitle').textContent = node.name;
  document.getElementById('gLvl').textContent = '🔍 聚焦模式';
  document.getElementById('focusBadge').classList.add('active');
  document.getElementById('focus-hint').style.display = 'block';

  // 收集相关节点和连线
  var ids = new Set();
  ids.add(node.id);
  var rels = [];

  var nodeEdges = EIX[node.id] || [];
  nodeEdges.forEach(function(l) {
    var srcId = typeof l.source === 'object' ? l.source.id : l.source;
    var tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    if (srcId === node.id || tgtId === node.id) {
      var otherId = srcId === node.id ? tgtId : srcId;
      ids.add(otherId);
      rels.push({ otherId: otherId, arrow: srcId === node.id ? '→' : '←', type: l.type || '关联', color: l.color || '#888' });
    }
  });

  connectedIds = ids;

  // 构建节点数据
  var focusNode = em[node.id] || { id: node.id, name: node.name, color: node.color || '#4A90D9', typeLabel: node.typeLabel || '' };
  var nodes = [
    {
      id: node.id,
      name: node.name,
      nodeType: 'focus',
      color: focusNode.color || '#4A90D9',
      val: 18,
      isCenter: true,
      typeLabel: focusNode.typeLabel,
      desc: focusNode.desc
    }
  ];

  var links = [];

  rels.forEach(function(r) {
    var rn = em[r.otherId];
    if (!rn) return;
    nodes.push({
      id: r.otherId,
      name: rn.name,
      nodeType: 'plnt',
      color: rn.color || '#888',
      val: 7,
      typeLabel: rn.typeLabel,
      desc: rn.desc
    });
    links.push({
      source: node.id,
      target: r.otherId,
      type: r.type,
      color: r.color
    });
  });

  // 在相关节点之间也添加连线（如果它们之间有关系）
  rels.forEach(function(r1) {
    rels.forEach(function(r2) {
      if (r1.otherId >= r2.otherId) return;
      var edge = EIX[r1.otherId] || [];
      var found = edge.find(function(e) {
        var s = typeof e.source === 'object' ? e.source.id : e.source;
        var t = typeof e.target === 'object' ? e.target.id : e.target;
        return (s === r1.otherId && t === r2.otherId) || (s === r2.otherId && t === r1.otherId);
      });
      if (found) {
        links.push({
          source: r1.otherId,
          target: r2.otherId,
          type: found.type || '关联',
          color: found.color || '#888'
        });
      }
    });
  });

  // 更新统计
  updateStats(nodes.length, links.length);

  // 渲染力导向图
  renderForceGraph(nodes, links, {
    label: function(n) {
      if (n.nodeType === 'focus') return n.name;
      return n.name + (n.typeLabel ? '\n' + n.typeLabel : '');
    },
    linkColor: function(l) { return l.color || '#888'; },
    linkWidth: function(l) { return l.type === '供应' || l.type === '采购' ? 2 : 1; },
    linkOpacity: function() { return 0.5; },
    nodeRadius: function(n) { return n.val || 6; },
    focusable: true,
    focusNode: nodes[0]  // 中心节点固定
  });

  // 右侧关联面板
  var hp = document.getElementById('highlight-panel');
  var hpContent = document.getElementById('hpContent');
  var html = '<div class="hp-count">⚡ ' + rels.length + ' 条关联 · ' + (nodes.length - 1) + ' 个相关节点</div>';
  rels.forEach(function(r) {
    var rn = em[r.otherId];
    if (!rn) return;
    html += '<div class="hp-item" onclick="focusHP(\'' + r.otherId + '\')">' +
      '<span class="hp-arrow">' + r.arrow + '</span>' +
      '<span class="hp-dot" style="background:' + (rn.color || '#888') + '"></span>' +
      '<span class="hp-rel-type">' + r.type + '</span>' +
      '<span class="hp-name">' + rn.name + '</span></div>';
  });
  hpContent.innerHTML = html || '<div style="color:#666;font-size:10px;padding:8px 0;text-align:center">无关联</div>';
  hp.style.display = 'block';

  // 周期性微热力模拟，保持布局活力
  var tickCount = 0;
  function pulseRefresh() {
    if (curFocus && simulation) {
      simulation.alpha(0.1).restart();
      tickCount++;
      if (tickCount < 50) {
        focusTimer = setTimeout(pulseRefresh, 100);
      }
    }
  }
  focusTimer = setTimeout(pulseRefresh, 200);
}

function focusHP(id) {
  if (em[id]) {
    showD(em[id]);
  }
}

function exitFocus() {
  curFocus = null;
  connectedIds = null;
  if (focusTimer) { clearTimeout(focusTimer); focusTimer = null; }
  document.getElementById('focusBadge').classList.remove('active');
  document.getElementById('focus-hint').style.display = 'none';
  document.getElementById('highlight-panel').style.display = 'none';
  document.getElementById('gTitle').textContent = curGal || '知识图谱星系';
  document.getElementById('gLvl').textContent = curLv === 'gal' ? '银河系 · ' + GAL.length + '个' : '☉ 太阳系';
}

// ===== 返回银河系（带过渡动画）=====
function backToGalaxy() {
  if (focusTimer) { clearTimeout(focusTimer); focusTimer = null; }
  // 记忆当前太阳系节点位置（用于逆向 GrowCircle）
  var fromPos = {};
  try {
    d3.selectAll('.node').each(function(d) {
      if (d && d.name && typeof d.x === 'number') {
        fromPos[d.name] = { x: d.x, y: d.y };
      }
    });
  } catch(e) {}

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loadInfo').textContent = '返回银河系 ...';
  curLv = 'gal';
  curGal = null;
  curFocus = null;
  connectedIds = null;
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('focusBadge').classList.remove('active');
  document.getElementById('focus-hint').style.display = 'none';
  document.getElementById('highlight-panel').style.display = 'none';
  document.getElementById('gTitle').textContent = '知识图谱星系';
  document.getElementById('gLvl').textContent = '银河系 · ' + GAL.length + '个行业';

  // 创建银河系节点数据
  var nodes = GAL.map(function(d, i) {
    var angle = (i / GAL.length) * Math.PI * 2;
    var radius = Math.min(W, H) * 0.35;
    var targetX = W/2 + Math.cos(angle) * radius;
    var targetY = H/2 + Math.sin(angle) * radius;
    var start = fromPos[d.name] || { x: W/2, y: H/2 };
    return {
      id: d.name,
      name: d.name,
      nodeType: 'gal',
      color: d.color,
      count: d.count,
      val: Math.max(15, Math.min(30, Math.log(d.count) * 5)),
      x: start.x,
      y: start.y,
      fx: targetX,
      fy: targetY,
      tx: targetX,
      ty: targetY
    };
  });

  var links = [];
  initSVG();
  var g = d3.select('#g');

  // 渲染连线
  var link = g.append('g').attr('class', 'links').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', '#555').attr('stroke-width', 1).attr('opacity', 0);

  // 渲染节点
  var node = g.append('g').attr('class', 'nodes').selectAll('g')
    .data(nodes).enter().append('g')
    .attr('class', 'node')
    .attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; })
    .style('opacity', 0)
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));

  node.append('circle')
    .attr('r', function(d) { return d.val; })
    .attr('fill', function(d) { return d.color; })
    .attr('stroke', '#fff').attr('stroke-width', 1)
    .attr('opacity', 0);

  node.append('text')
    .attr('dy', function(d) { return d.val + 12; })
    .attr('text-anchor', 'middle')
    .attr('fill', '#ddd').attr('font-size', '10px')
    .text(function(d) { return d.name + '\n' + '(' + d.count + '家)'; });

  node.on('click', function(event, d) { solar(d.name); });
  node.on('mouseover', function(event, d) {
    var t = document.getElementById('tooltip');
    t.style.display = 'block';
    t.innerHTML = '<div class="tt-name">' + d.name + '</div><div class="tt-type">行业 · ' + d.count + '家企业</div>';
    t.style.left = (event.pageX + 10) + 'px';
    t.style.top = (event.pageY - 10) + 'px';
  });
  node.on('mouseout', function() { document.getElementById('tooltip').style.display = 'none'; });

  updateStats(nodes.length, links.length);
  document.getElementById('loading').style.display = 'none';

  // 逆向 GrowCircle 动画：从当前位置飞到圆形布局
  node.transition().duration(800).ease(d3.easeCubicOut)
    .style('opacity', 1)
    .attrTween('transform', function(d) {
      var startX = d.x, startY = d.y;
      var endX = d.tx, endY = d.ty;
      return function(t) {
        return 'translate(' + (startX + (endX - startX) * t) + ',' + (startY + (endY - startY) * t) + ')';
      };
    });

  d3.selectAll('.node circle').transition().duration(800).attr('opacity', 0.85);

  // 动画完成后自动缩放适配
  setTimeout(function() {
    fitView(d3.select('#g'), nodes);
  }, 900);
}

// ===== 数据加载 =====
function loadSectorData(name, callback) {
  var encoded = encodeURIComponent(name);
  d3.json('data/sector-' + encoded + '.json').then(function(data) {
    callback(data);
  }).catch(function(err) {
    console.error('Failed to load sector:', name, err);
    callback({ entities: [], edges: [] });
  });
}

function loadEdgeIndex(callback) {
  if (EIX) { callback(); return; }
  d3.json('data/edge-index.json').then(function(data) {
    EIX = data;
    // 构建实体映射
    Object.keys(EIX).forEach(function(key) {
      EIX[key].forEach(function(link) {
        var src = typeof link.source === 'object' ? link.source.id : link.source;
        var tgt = typeof link.target === 'object' ? link.target.id : link.target;
        if (!em[src]) em[src] = { id: src, name: src };
        if (!em[tgt]) em[tgt] = { id: tgt, name: tgt };
      });
    });
    callback();
  }).catch(function(err) {
    console.error('Failed to load edgeIndex:', err);
    callback();
  });
}

// ===== 节点详情 =====
function showD(n) {
  if (!EIX || !EIX[n.id]) {
    loadEdgeIndex(function() {
      if (EIX && EIX[n.id]) showD(n);
      else {
        document.getElementById('dContent').innerHTML = '<div style="color:#888;text-align:center;padding:10px">无关联数据</div>';
        document.getElementById('node-detail').style.display = 'block';
      }
    });
    return;
  }
  var e = em[n.id];
  if (!e) return;
  var rs = (EIX[n.id] || []).slice(0, 25);
  var html = '<h2><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (e.color || '#888') + '"></span>' + e.name + (e.typeLabel ? '<span class="nd-type" style="background:' + (e.color || '#888') + '22;color:' + (e.color || '#888') + '">' + e.typeLabel + '</span>' : '') + '</h2>';
  html += '<div class="nd-meta">🏛 ' + (e.industry || '未分类') + '</div>';
  if (e.desc) html += '<div class="nd-desc">' + e.desc + '</div>';
  if (rs.length) {
    html += '<div style="color:#888;font-size:10px;margin-bottom:3px">🔗 关系 (' + rs.length + '条)</div>';
    rs.forEach(function(l) {
      var o = em[l.source === n.id ? l.target : l.source];
      if (!o) return;
      html += '<div class="nd-rel-item" onclick="showD(em[\'' + (l.source === n.id ? l.target : l.source) + '\'])">' +
        '<span style="width:6px;height:6px;border-radius:50%;background:' + (o.color || '#888') + '"></span>' +
        '<span>' + o.name + '</span>' +
        '<span style="color:#666;font-size:9px;margin-left:auto">' + (l.type || '关联') + '</span></div>';
    });
  }
  document.getElementById('dContent').innerHTML = html;
  document.getElementById('node-detail').style.display = 'block';
}
function closeD() { document.getElementById('node-detail').style.display = 'none'; }

function updateStats(n, e) {
  document.getElementById('sN').textContent = n;
  document.getElementById('sE').textContent = e;
}

// ===== 搜索 =====
// ===== 搜索 =====
document.getElementById('search').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    searchNode(this.value);
  }
});

function searchNode(query) {
  if (!query || query.length < 2) return;
  query = query.toLowerCase();

  // 清除之前的高亮
  d3.selectAll('.node-highlight').classed('node-highlight', false);
  d3.selectAll('circle').attr('stroke', function(d) {
    return d && d.nodeType === 'star' ? '#FFD700' : '#fff';
  }).attr('stroke-width', function(d) {
    return d && d.nodeType === 'star' ? 2 : 1;
  });

  // 在银河系中搜索
  if (curLv === 'gal') {
    var found = GAL.find(function(d) { return d.name.toLowerCase().includes(query); });
    if (found) {
      solar(found.name);
      document.getElementById('search').value = '';
    }
    return;
  }

  // 在太阳系/聚焦中搜索
  var allNodes = g ? g.selectAll('.node').data() : [];
  
  // 先在当前可见节点中查找
  var visibleMatch = allNodes.find(function(d) {
    return d && d.name && d.name.toLowerCase().includes(query);
  });
  
  if (visibleMatch) {
    // 高亮匹配节点
    d3.selectAll('.node').filter(function(d) {
      return d && d.name && d.name.toLowerCase().includes(query);
    }).classed('node-highlight', true).select('circle')
      .attr('stroke', '#00FF88')
      .attr('stroke-width', 3);
    
    // 如果只有一个匹配，直接聚焦
    var exactMatch = allNodes.filter(function(d) {
      return d && d.name && d.name.toLowerCase() === query;
    });
    if (exactMatch.length === 1) {
      focusMode(exactMatch[0]);
      document.getElementById('search').value = '';
    } else if (visibleMatch.nodeType === 'plnt') {
      focusMode(visibleMatch);
      document.getElementById('search').value = '';
    }
    return;
  }

  // 在EIX（边索引）中查找未加载的实体
  if (EIX) {
    var foundId = Object.keys(EIX).find(function(k) {
      return (em[k] && em[k].name && em[k].name.toLowerCase().includes(query));
    });
    if (foundId && em[foundId]) {
      focusMode(em[foundId]);
      document.getElementById('search').value = '';
    }
  }
}

// ===== 初始化 =====
initSVG();
renderGalaxy();

// 窗口大小变化
window.addEventListener('resize', function() {
  W = window.innerWidth;
  H = window.innerHeight;
  if (simulation) {
    simulation.force('center', d3.forceCenter(W/2, H/2));
    simulation.alpha(0.1).restart();
  }
  svg.attr('width', W).attr('height', H);
});

// ESC 退出聚焦
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && curFocus) exitFocus();
});
