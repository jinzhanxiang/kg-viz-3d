<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=0.25">
<title>知识图谱 — Sigma.js</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#e0e0e0}
#sigma-container{position:fixed;inset:0;width:100%;height:100%}
#sigma-container canvas{display:block;width:100%!important;height:100%!important}
#loading{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0e17;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4C78A8;border-radius:50%;animation:spin .8s linear infinite}
#loading p{margin-top:16px;font-size:14px;color:#888}
@keyframes spin{to{transform:rotate(360deg)}}
#stats{position:fixed;top:12px;left:12px;z-index:100;font-size:12px;color:#666;background:rgba(10,14,23,0.8);backdrop-filter:blur(8px);padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);pointer-events:none;line-height:1.6}
#stats strong{color:#aaa}
#tooltip{position:fixed;z-index:200;display:none;max-width:300px;background:rgba(20,26,40,0.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.5;pointer-events:none;z-index:200}
#tooltip .tt-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
#tooltip .tt-industry{color:#888}
#tooltip .tt-desc{color:#999;margin-top:4px;font-size:11px}
#tooltip .tt-degree{color:#4C78A8;font-size:11px;margin-top:2px}
#legend{position:fixed;bottom:12px;left:12px;z-index:100;font-size:11px;background:rgba(10,14,23,0.85);backdrop-filter:blur(8px);padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);max-height:40vh;overflow-y:auto;pointer-events:none}
#legend .lg-item{display:flex;align-items:center;gap:6px;margin:2px 0;white-space:nowrap}
#legend .lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#legend .lg-count{color:#555;margin-left:auto}
#detail-panel{position:fixed;top:12px;right:12px;z-index:200;width:320px;max-height:calc(100vh - 24px);background:rgba(16,22,36,0.96);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;overflow-y:auto;transition:transform .25s ease,opacity .25s ease}
#detail-panel.hidden{transform:translateX(350px);opacity:0;pointer-events:none}
#detail-panel.visible{transform:translateX(0);opacity:1}
.dp-close{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:rgba(255,255,255,0.08);border-radius:6px;color:#888;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.dp-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;padding-right:30px}
.dp-meta{font-size:11px;color:#666;margin-bottom:12px}
.dp-desc{font-size:12px;color:#999;line-height:1.6;margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:6px}
.dp-section-title{font-size:12px;color:#555;margin-bottom:6px}
.dp-neighbors{display:flex;flex-wrap:wrap;gap:4px}
.dp-nb-item{font-size:11px;color:#aaa;background:rgba(255,255,255,0.04);padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-nb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dp-more{font-size:11px;color:#555;padding:3px 8px}
#search-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:150}
#search{width:260px;padding:8px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(10,14,23,0.85);backdrop-filter:blur(8px);color:#e0e0e0;font-size:13px;outline:none;transition:border-color .2s}
#search:focus{border-color:#4C78A8}
#search::placeholder{color:#555}
#search-dropdown{position:fixed;top:48px;left:50%;transform:translateX(-50%);width:360px;max-height:300px;overflow-y:auto;background:rgba(16,22,36,0.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;display:none;z-index:150}
#search-dropdown.visible{display:block}
.sd-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;align-items:center}
.sd-item:last-child{border-bottom:none}
.sd-item:hover{background:rgba(76,120,168,0.15)}
.sd-item .sd-name{color:#ddd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd-item .sd-ind{color:#555;font-size:10px;flex-shrink:0}
.sd-item .sd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd-more{text-align:center;padding:6px;font-size:11px;color:#555}
@media(max-width:600px){
  #stats{font-size:10px;padding:5px 10px;top:8px;left:8px}
  #legend{font-size:10px;padding:6px 10px;bottom:8px;left:8px;max-height:30vh}
  #tooltip{max-width:200px;font-size:11px;padding:8px 10px}
  #detail-panel{width:calc(100vw - 16px);top:8px;right:8px;max-height:calc(100vh - 16px)}
  #search{width:180px;font-size:12px;padding:6px 10px}
  #search-dropdown{width:300px;top:44px}
  #search-wrap{top:8px}
}
</style>
</head>
<body>
<div id="search-wrap"><input id="search" type="text" placeholder="搜索节点..." autocomplete="off"><div id="search-dropdown"></div></div>
<div id="loading"><div class="spinner"></div><p>加载知识图谱数据...</p></div>
<div id="stats">节点 <strong id="s-nodes">0</strong> · 边 <strong id="s-edges">0</strong> · 行业 <strong id="s-industries">0</strong></div>
<div id="legend"></div>
<div id="tooltip"></div>
<div id="detail-panel" class="hidden"></div>
<div id="sigma-container"></div>
<script src="dist/bundle.js"></script>
</body>
</html>
